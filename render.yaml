services:
  - type: web
    name: qr-satisfaction-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEVICE_HASH_SECRET
        generateValue: true
